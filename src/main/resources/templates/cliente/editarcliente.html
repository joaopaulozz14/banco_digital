<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{layout/layoutprincipal :: estrutura(~{:: #conteudoEdicao})}">
<body>

    <div id="conteudoEdicao">
        <h2>Atualizar Dados do Cliente</h2>
        <hr>

        <form th:action="@{/editarcliente}" th:object="${cliente}" method="POST">
            
            <input type="hidden" th:field="*{idPessoa}" />

            <div class="form-group">
                <label>Nome Completo:</label>
                <input type="text" th:field="*{nome}" required />
                <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>

            <div class="form-group">
                <label>CPF:</label>
                <input type="text" th:field="*{cpf}" required />
                <span class="error" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></span>
            </div>

            <div class="form-group">
                <label>Telefone:</label>
                <input type="text" th:field="*{telefone}" />
            </div>

            <div class="form-group">
                <label>Data de Nascimento:</label>
                <input type="date" th:field="*{dataNascimento}" />
            </div>

            <div class="form-group">
                <label>Renda Mensal (R$):</label>
                <input type="number" step="0.01" th:field="*{renda}" required />
                <span class="error" th:if="${#fields.hasErrors('renda')}" th:errors="*{renda}"></span>
            </div>

            <br>
            <button type="submit" class="btn btn-primary">Atualizar Cadastro</button>
            <a th:href="@{/buscarcliente}" style="margin-left: 15px;">Cancelar</a>
        </form>
    </div>

</body>
</html>
