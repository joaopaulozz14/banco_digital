<div id="conteudoDetalhes">

    <!-- Cabeçalho -->
    <div class="topo-dashboard">

        <div>
            <h1 th:text="|Olá, ${cliente.nome}|"></h1>

            <p class="subtitulo">
                Bem-vindo ao painel bancário
            </p>
        </div>

    </div>

    <!-- Cards -->
    <div class="cards-financeiros">

        <div class="card-financeiro">
            <h3>Saldo Total</h3>

            <p class="valor positivo"
               th:text="|R$ ${saldoTotal}|">
            </p>
        </div>

        <div class="card-financeiro">
            <h3>Limite Disponível</h3>

            <p class="valor azul"
               th:text="|R$ ${limiteTotal}|">
            </p>
        </div>

    </div>

    <!-- Tabela -->
    <div class="area-tabela">

        <h2>Contas Associadas</h2>

        <table>

            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Saldo</th>
                    <th>Limite</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="conta : ${cliente.contas}">

                    <td th:text="${conta.tipoConta}"></td>

                    <td th:text="|R$ ${conta.saldoAtual}|"></td>

                    <td th:text="|R$ ${conta.limite}|"></td>

                </tr>

            </tbody>

        </table>

    </div>
	
	<!-- Cartoes associados a conta-->
	<div class="area-tabela">

	    <h2>Cartões Associados</h2>

	    <table>

	        <thead>
	            <tr>
	                <th>Numero</th>
	                <th>Validade</th>
	                <th>Limite</th>
	            </tr>
	        </thead>

	        <tbody th:each="conta : ${cliente.contas}">
	            <tr th:each="cartao : ${conta.cartoes}">

	                <td th:text="${cartao.numero}"></td>
					<td th:text="${cartao.validade}"></td>
					<td th:text="${cartao.limite}"></td>

	            </tr>

	        </tbody>

	    </table>

	</div>
	
		
	<!-- SAQUE E DEPOSITO -->
	<div>

		</tr>
		
		<tr th:each="conta : ${cliente.contas}">

		    <td>

		        <!-- DEPÓSITO -->

		        <form th:action="@{/depositar}"
		              method="POST">

		            <input type="hidden"
		                   name="idConta"
		                   th:value="${conta.idConta}" />

		            <input type="hidden"
		                   name="idCliente"
		                   th:value="${cliente.idPessoa}" />

		            <input type="number"
		                   step="0.01"
		                   name="valor"
		                   placeholder="Depósito" />

		            <button type="submit"
		                    class="btn btn-success">

		                Depositar
		            </button>

		        </form>

		        <br>

		        <!-- SAQUE -->

		        <form th:action="@{/sacar}"
		              method="POST">

		            <input type="hidden"
		                   name="idConta"
		                   th:value="${conta.idConta}" />

		            <input type="hidden"
		                   name="idCliente"
		                   th:value="${cliente.idPessoa}" />

		            <input type="number"
		                   step="0.01"
		                   name="valor"
		                   placeholder="Saque" />

		            <button type="submit"
		                    class="btn btn-danger">

		                Sacar
		            </button>

		        </form>

		    </td>

		</tr>
	</div>

</div>

<style>
	/* DASHBOARD */

	.topo-dashboard {
	    display: flex;
	    justify-content: space-between;
	    align-items: center;

	    margin-bottom: 30px;
	}

	.subtitulo {
	    color: #777;
	    margin-top: -10px;
	}

	/* CARDS */

	.cards-financeiros {

	    display: flex;
	    gap: 20px;

	    flex-wrap: wrap;

	    margin-bottom: 40px;
	}

	.card-financeiro {

	    flex: 1;
	    min-width: 250px;

	    background: linear-gradient(135deg, #ffffff, #f8f9fa);

	    border-radius: 12px;

	    padding: 25px;

	    box-shadow:
	        0 4px 10px rgba(0,0,0,0.08);

	    transition: 0.3s;
	}

	.card-financeiro:hover {

	    transform: translateY(-3px);

	    box-shadow:
	        0 8px 20px rgba(0,0,0,0.12);
	}

	.card-financeiro h3 {

	    margin-top: 0;

	    color: #555;

	    font-size: 1rem;
	}

	.valor {

	    font-size: 2rem;

	    font-weight: bold;

	    margin-top: 15px;
	}

	.positivo {
	    color: #28a745;
	}

	.azul {
	    color: #007bff;
	}

	/* TABELA */

	.area-tabela {

	    background-color: white;

	    padding: 25px;

	    border-radius: 12px;

	    box-shadow:
	        0 2px 8px rgba(0,0,0,0.05);
	}

	.area-tabela h2 {

	    margin-top: 0;

	    margin-bottom: 20px;
	}

	table {

	    width: 100%;

	    border-collapse: collapse;
	}

	th {

	    background-color: #343a40;

	    color: white;

	    padding: 14px;

	    text-align: left;
	}

	td {

	    padding: 14px;

	    border-bottom: 1px solid #eee;
	}

	tr:hover {

	    background-color: #f8f9fa;
	}
</style>
