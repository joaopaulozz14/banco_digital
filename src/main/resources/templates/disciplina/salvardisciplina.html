<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layoutprincipal.html}">

<head>
    <title>Salvar Disciplina</title>
</head>

<body>
    <div class=" container" layout:fragment="conteudoprincipal">
        <div class="p-4 p-md-5 mt-4 mb-4 rounded text-body-emphasis bg-body-secondary">
            <div class="col-lg-6 px-0">
                <h1 class="display-4 fst-italic">Salvar Disciplina</h1>
                <p class="lead my-3">Preencha os dados da disciplina .</p>
                <p class="lead mb-0"><a href="#" class="text-body-emphasis fw-bold">Continue reading...</a></p>
            </div>
        </div>

        <form action="/salvardisciplina" method="post">
            <div class="row mb-3">
                <div class="col-md-8">
                    <label for="inputnome" class="form-label">Nome</label>
                    <input type="text" class="form-control" id="inputnome" name="nome" aria-describedby="nomeHelp">
                    <div id="nomeHelp" class="form-text">We'll never share your name with anyone else.</div>
                </div>
                <div class="col-md-4">
                    <label for="inputcargahoraria" class="form-label">Carga Horária</label>
                    <input type="number" class="form-control" id="inputcargahoraria" name="cargahoraria" aria-describedby="cargahorariaHelp">
                    <div id="cargahorariaHelp" class="form-text">We'll never share your workload with anyone
                        else.</div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label for="inputdescricao" class="form-label">Descrição</label>
                    <textarea class="form-control" id="inputdescricao" name="descricao" rows="3" aria-describedby="descricaoHelp"></textarea>
                    <div id="descricaoHelp" class="form-text">We'll never share your description with anyone else.</div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="inputprofessor" class="form-label">Professor</label>
                    <input type="text" class="form-control" id="inputprofessor" name="professor" aria-describedby="professorHelp">
                    <div id="professorHelp" class="form-text">We'll never share your professor information with anyone else.</div>
                </div>
            </div>
            <div class="col-md-12 mt-4">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
        </form>
    </div>
    </div>
</body>

</html>
