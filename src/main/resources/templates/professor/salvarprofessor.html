<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layoutprincipal.html}">

<head>
    <title>Salvar Professor</title>
</head>

<body>
    <div class=" container" layout:fragment="conteudoprincipal">
        <div class="p-4 p-md-5 mt-4 mb-4 rounded text-body-emphasis bg-body-secondary">
            <div class="col-lg-6 px-0">
                <h1 class="display-4 fst-italic">Salvar Professor</h1>
                <p class="lead my-3">Preencha os dados do professor .</p>
                <p class="lead mb-0"><a href="#" class="text-body-emphasis fw-bold">Continue reading...</a></p>
            </div>
        </div>

        <form action="/salvarprofessor" method="post" th:object="${professor}">
            <input type="text" hidden th:field="*{idPessoa}">

            <div class="row mb-3">
                <div class="col-md-8">
                    <label for="nome" class="form-label">Nome</label>
                    <input type="text" class="form-control" th:field="*{nome}">
                    <ul>
                        <li th:each="error : ${#fields.errors('nome')}" th:text="${error}" class="text-danger"></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <label for="cpf" class="form-label">CPF</label>
                    <input type="text" class="form-control" th:field="*{cpf}" aria-describedby="cpfHelp">
                    <ul>
                        <li th:each="error : ${#fields.errors('cpf')}" th:text="${error}" class="text-danger"></li>
                    </ul>
                    <div id="cpfHelp" class="form-text">Nunca compartilhe seu CPF com ninguém.</div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label for="dataNascimento" class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" th:field="*{dataNascimento}">
                    <ul>
                        <li th:each="error : ${#fields.errors('dataNascimento')}" th:text="${error}" class="text-danger"></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <label for="siape" class="form-label">SIAPE</label>
                    <input type="text" class="form-control" th:field="*{siape}" aria-describedby="siapeHelp">
                    <ul>
                        <li th:each="error : ${#fields.errors('siape')}" th:text="${error}" class="text-danger"></li>
                    </ul>
                    <div id="siapeHelp" class="form-text">Preencimento obrigatório.</div>
                </div>
                <div class="col-md-4">
                    <label for="dataPosse" class="form-label">Data de Posse</label>
                    <input type="date" class="form-control" th:field="*{dataPosse}">
                    <ul>
                        <li th:each="error : ${#fields.errors('dataPosse')}" th:text="${error}" class="text-danger"></li>
                    </ul>
                </div>
                <div class="col-md-12 mt-4">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </div>
        </form>
    </div>
    </div>
</body>

</html>
