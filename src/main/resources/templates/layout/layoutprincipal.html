<!-- ========================= -->
<!-- layout/layoutprincipal.html -->
<!-- ========================= -->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="estrutura(conteudoTela)">

<head>
    <meta charset="UTF-8">
    <title>Banco Digital - IFMS</title>

    <style>

        *{
            box-sizing: border-box;
        }

        body{
            margin:0;
            padding:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color:#f4f6f9;
            color:#343a40;
        }

        /* NAVBAR */

        .navbar{
            background-color:#343a40;
            padding:15px 30px;
            display:flex;
            gap:15px;
            align-items:center;
            box-shadow:0 2px 5px rgba(0,0,0,0.15);
        }

        .navbar a{
            color:white;
            text-decoration:none;
            font-weight:bold;
            padding:10px 14px;
            border-radius:4px;
            transition:0.3s;
        }

        .navbar a:hover{
            background-color:#495057;
        }

        /* CONTAINER */

        .container{
            background-color:white;
            margin:25px auto;
            width:90%;
            max-width:1200px;
            min-height:75vh;
            padding:30px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.05);
        }

        /* FOOTER */

        footer{
            text-align:center;
            padding:20px;
            color:#777;
            font-size:0.9em;
            border-top:1px solid #ddd;
            margin-top:30px;
        }

        /* FORMULÁRIOS */

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            max-width:400px;
            padding:10px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        .error{
            display:block;
            margin-top:5px;
            color:red;
            font-size:0.9em;
        }

        /* BOTÕES */

        .btn{
            border:none;
            padding:10px 15px;
            border-radius:4px;
            cursor:pointer;
            font-weight:bold;
            text-decoration:none;
            display:inline-block;
            transition:0.3s;
        }

        .btn-success{
            background-color:#28a745;
            color:white;
        }

        .btn-primary{
            background-color:#007bff;
            color:white;
        }

        .btn-warning{
            background-color:#ffc107;
            color:black;
        }

        .btn-danger{
            background-color:#dc3545;
            color:white;
        }

        .btn:hover{
            opacity:0.9;
        }

        /* TABELAS */

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        th, td{
            border:1px solid #ddd;
            padding:12px;
            text-align:left;
        }

        th{
            background-color:#f2f2f2;
        }

        tr:hover{
            background-color:#f9f9f9;
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">
        <a th:href="@{/}">Início</a>
        <a th:href="@{/buscarcliente}">Clientes</a>
        <a th:href="@{/buscargerente}">Gerentes</a>
    </div>

    <!-- CONTEÚDO DINÂMICO -->

    <div class="container">
        <div th:replace="${conteudoTela}"></div>
    </div>

    <!-- FOOTER -->

    <footer>
        <p>&copy; 2026 - Sistema Banco Digital IFMS</p>
    </footer>

</body>

</html>
```
