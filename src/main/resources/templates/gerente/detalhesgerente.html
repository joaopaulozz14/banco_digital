<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons para o ícone do cartão -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <div>
        <h2 th:text="${gerente.nome}"></h2>

        <p>
            Salário:
            <span th:text="${gerente.salario}"></span>
        </p>
    </div>

    <div class="card">

        <h3>Clientes Responsáveis</h3>

        <h1 th:text="${#lists.size(gerente.clientes)}"></h1>

    </div>

    <div>
        <table>

            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Renda</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="cliente : ${gerente.clientes}">

                    <td th:text="${cliente.nome}"></td>
                    <td th:text="${cliente.cpf}"></td>
                    <td th:text="${cliente.renda}"></td>

                </tr>

            </tbody>

        </table>
    </div>

    <!-- Botao de Voltar -->
    <div class="d-flex justify-content-end">
        <a th:href="@{/buscargerente}" class="btn btn-secondary fw-medium">Voltar à Lista de Gerentes</a>
    </div>
    </div>

    <!-- Bootstrap Bundle JS (opcional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
